services:
  dmv-scraper:
    #image: ghcr.io/tmcelroy2202/nc-dmv-scraper:latest
    image: nc-dmv-scraper
    container_name: nc-dmv-scraper
    environment:
      # --- Notifications: configure at least one ---
      # Option 1: Discord webhook (or ntfy.sh URL)
      #YOUR_DISCORD_WEBHOOK_URL: "YOUR_WEBHOOK_URL_HERE"
      # Option 2: Pushover (if both are set, Pushover takes priority)
      #PUSHOVER_APP_TOKEN: "APP_TOKEN"
      #PUSHOVER_USER_KEY: "USER_1_TOKEN,USER_2_TOKEN"

      # --- Extra Configuration ---
      # remove the # before these lines to make them
      # have an effect
      APPOINTMENT_TYPE: "Teen Driver Level 2"
      #APPOINTMENT_TYPE: "Driver License - First Time"
      YOUR_ADDRESS: "123 Any Street, Raleigh NC"
      DISTANCE_RANGE: 20
      #PROOF_OF_LIFE: True
      #DATE_RANGE_START: "02/23/2026"
      #DATE_RANGE_END: "06/23/2026"
      # do not use date_range relative ( e.g. 2w ) AND date_range_start / date_range_end at same time. use one or the other.
      DATE_RANGE: "4w"
      TIME_RANGE_START: "8:00"
      TIME_RANGE_END: "19:00"
    restart: unless-stopped
